name: FamilyBudget
options:
  bundleIdPrefix: ru.protos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "G5JZKT7GW8" # Set your team ID here (required for CloudKit)
    CODE_SIGN_STYLE: Automatic

targets:

  # ─────────────────────────────────────────────
  # Main App
  # ─────────────────────────────────────────────
  CloudKitSharing:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
    info:
      path: App/Resources/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
        CKSharingSupported: true
    entitlements:
      path: App/Resources/App.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.ru.protos.cloudkitsharing
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.protos.cloudkitsharing
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
