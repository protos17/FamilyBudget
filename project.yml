name: iShareBudget
options:
  bundleIdPrefix: ru.protos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ru

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "G5JZKT7GW8"
    CODE_SIGN_STYLE: Automatic

targets:

  # ─────────────────────────────────────────────
  # Main App
  # ─────────────────────────────────────────────
  iShareBudget:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: "iShareBudget"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        CKSharingSupported: true
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: App/Resources/App.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.ru.protos.sharebudget
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ru.protos.sharebudget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "14"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: LaunchBackground
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
